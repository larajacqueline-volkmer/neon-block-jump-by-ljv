<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Neon Block Jump by LJV</title>
  <meta name="theme-color" content="#ff4fd8" />
  <meta name="description" content="Neon Block Jump by LJV – ein neonfarbenes Jump-Spiel mit 100 Levels." />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="wrap app-header">
    <h1>Neon Block Jump by LJV</h1>
    <p class="subtitle">Springe von Plattform zu Plattform und erreiche Level 100.</p>
  </header>

  <main class="wrap">
    <section id="game-frame" aria-label="Spielfeld">
      <div id="game-container" aria-label="Spielbereich"></div>
      <div id="overlay" aria-hidden="true"></div>
    </section>

    <section id="hud" aria-label="Spielinformationen">
      <div class="hud-row">
        <div id="level-info">Level 1 von 100</div>
        <div id="status-pill">Bereit</div>
      </div>

      <div class="progress" aria-label="Fortschritt">
        <div id="progress-bar"></div>
      </div>

      <div class="menu-buttons">
        <button id="continueButton" class="btn" type="button">Fortfahren</button>
        <button id="restartButton" class="btn" type="button">Neustart</button>
        <button id="saveButton" class="btn btn-primary" type="button">Speichern</button>
      </div>

      <div class="hint">
        Desktop: ← → bewegen, Leertaste springen, Enter bestätigen ·
        Mobile: Buttons unten nutzen
      </div>
    </section>
  </main>

  <div id="touch-controls" aria-label="Mobile Steuerung">
    <button id="leftBtn" class="touch-btn" type="button" aria-label="Nach links">◀</button>
    <button id="jumpBtn" class="touch-btn touch-btn-main" type="button" aria-label="Springen">▲</button>
    <button id="rightBtn" class="touch-btn" type="button" aria-label="Nach rechts">▶</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
  <script src="script.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js").catch(console.error);
      });
    }
  </script>
</body>
</html>
